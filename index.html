<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfricaUni</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#eef2f5}
header{background:#1e90ff;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
input,textarea{width:100%;padding:10px;box-sizing:border-box;margin:5px 0}
button{padding:10px;border:none;border-radius:8px;background:#1e90ff;color:#fff}
#chatBox{height:220px;overflow:auto;border:1px solid #ddd;padding:8px}
video{width:100%;background:#000;border-radius:10px}
</style>
</head>
<body>
<header>
<h1>AfricaUni</h1>
<p>Connect • Create • Meet • Share</p>
</header>

<div class="container">
<div class="card">
<input id="username" placeholder="Username">
<button onclick="login()">Login</button>
</div>

<div class="card">
<h3>Create Post</h3>
<textarea id="postText"></textarea>
<input type="file" id="imageInput" accept="image/*">
<button onclick="addPost()">Post</button>
<div id="feed"></div>
</div>

<div class="card">
<h3>Chat</h3>
<div id="chatBox"></div>
<input id="msgInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="card">
<h3>Meet</h3>
<button onclick="findMatch()">Find Match</button>
<button onclick="startCamera()">Start Camera</button>
<p id="status">Not connected</p>
<video id="myVideo" autoplay muted playsinline></video>
</div>
</div>

<script>
const API="https://africauni-backend1-1.onrender.com";
let username="";
let socket=io(API);

function login(){
 username=document.getElementById("username").value;
 alert("Logged in as "+username);
}

function addPost(){
 const text=document.getElementById("postText").value;
 const image=document.getElementById("imageInput").files[0];
 const div=document.createElement("div");
 div.className="card";
 if(image){
   div.innerHTML="<b>"+username+"</b><br>"+text+"<br><img src='"+URL.createObjectURL(image)+"' style='width:100%'>";
 }else{
   div.innerHTML="<b>"+username+"</b><br>"+text;
 }
 document.getElementById("feed").prepend(div);
}

socket.emit("joinChat","africauni-room");

socket.on("newMessage",(data)=>{
 const d=document.createElement("div");
 d.innerHTML="<b>"+data.user+":</b> "+data.message;
 document.getElementById("chatBox").appendChild(d);
});

function sendMessage(){
 const msg=document.getElementById("msgInput").value;
 socket.emit("sendMessage",{roomId:"africauni-room",user:username,message:msg});
 document.getElementById("msgInput").value="";
}

function findMatch(){ socket.emit("findMatch"); }

socket.on("status",(m)=>document.getElementById("status").innerText=m);
socket.on("matched",()=>document.getElementById("status").innerText="Connected 🎉");

async function startCamera(){
 try{
  const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("myVideo").srcObject=stream;
 }catch(e){
  alert("Allow camera permission");
 }
}
</script>
</body>
</html>
