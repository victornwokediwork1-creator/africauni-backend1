<!DOCTYPE html>
<html>
<head>
<title>AfricaUni</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center}
.hidden{display:none}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

input{
  padding:10px;
  margin:5px;
  width:80%;
}

.box{padding:15px}

video{
  width:90%;
  max-width:400px;
  border-radius:10px;
  background:black;
}
</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome">
  <h1>🎓 AfricaUni</h1>
  <p>Welcome to African University Network</p>
  <button onclick="goLogin()">Next</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="hidden">
  <h2>Login</h2>
  <input id="name" placeholder="Enter your name">
  <button onclick="enterApp()">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">

  <h2>Welcome, <span id="user"></span></h2>

  <button onclick="show('post')">📢 Post</button>
  <button onclick="show('chat')">💬 Chat</button>
  <button onclick="show('meet')">📡 Meet</button>

  <!-- POSTS -->
  <div id="post" class="box">
    <h3>Posts</h3>

    <input id="text" placeholder="Write post"><br>
    <input type="file" id="img"><br>
    <button onclick="upload()">Post</button>

    <div id="posts"></div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="box hidden">
    <h3>Chat Room</h3>

    <input id="room" placeholder="Room name">
    <button onclick="join()">Join</button>

    <div id="msgs"></div>

    <input id="msg" placeholder="Message">
    <button onclick="send()">Send</button>
  </div>

  <!-- MEET -->
  <div id="meet" class="box hidden">
    <h3>Meet</h3>

    <video id="cam" autoplay playsinline></video>

    <br>

    <button onclick="startCam()">Start Camera</button>
    <button onclick="findMatch()">Find Match</button>
    <button onclick="disconnectCam()">Disconnect</button>

    <p id="status">Idle</p>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let room="";
let stream;

/* ========== NAV ========== */
function goLogin(){
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

function enterApp(){
  const name = document.getElementById("name").value;
  if(!name) return alert("Enter name");

  document.getElementById("user").innerText = name;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function show(id){
  document.getElementById("post").classList.add("hidden");
  document.getElementById("chat").classList.add("hidden");
  document.getElementById("meet").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}

/* ========== POSTS FIXED ========== */
async function upload(){
  const text=document.getElementById("text").value;
  const img=document.getElementById("img").files[0];

  const form=new FormData();
  form.append("text",text);
  if(img) form.append("image",img);

  const res = await fetch("/post",{
    method:"POST",
    body:form
  });

  const data = await res.json();
  if(data.success){
    loadPosts();
  } else {
    alert("Post failed");
  }
}

async function loadPosts(){
  const res = await fetch("/posts");
  const data = await res.json();

  document.getElementById("posts").innerHTML =
    data.map(p=>`
      <div style="margin:10px;padding:10px;background:#1e293b;border-radius:10px">
        <p>${p.text}</p>
        ${p.image ? `<img src="${p.image}" width="100%">` : ""}
      </div>
    `).join("");
}
loadPosts();

/* ========== CHAT ========== */
function join(){
  room=document.getElementById("room").value;
  socket.emit("join",room);
}

socket.on("history",(msgs)=>{
  document.getElementById("msgs").innerHTML =
    msgs.map(m=>`<p>${m.msg}</p>`).join("");
});

socket.on("new",(d)=>{
  document.getElementById("msgs").innerHTML += `<p>${d.msg}</p>`;
});

function send(){
  socket.emit("msg",{room,msg:document.getElementById("msg").value});
}

/* ========== MEET FIXED CAMERA ========== */
async function startCam(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    document.getElementById("cam").srcObject = stream;
    document.getElementById("status").innerText="Camera ON";
  }
  catch(err){
    alert("Camera permission denied or not supported");
  }
}

function findMatch(){
  document.getElementById("status").innerText =
    "Searching (demo mode)";
}

function disconnectCam(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
  document.getElementById("cam").srcObject=null;
  document.getElementById("status").innerText="Disconnected";
}
</script>

</body>
</html>
