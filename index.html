<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AfricaUni</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f5}
.page{display:none;padding:20px}
.page.active{display:block}
#welcome{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#1e90ff;color:white}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#1e90ff;color:white}
input,textarea{width:100%;padding:10px;margin:5px 0}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px}
.nav{display:flex;justify-content:space-around;background:#1e90ff}
.nav button{background:white;color:#1e90ff}
.section{display:none}
.section.active{display:block}
video{width:100%;border-radius:10px}
</style>
</head>

<body>

<div id="welcome" class="page active">
<h2>AfricaUni</h2>
<button onclick="goLogin()">Start</button>
</div>

<div id="login" class="page">
<input id="username" placeholder="Username">
<button onclick="login()">Enter</button>
</div>

<div id="dashboard" class="page">

<div class="nav">
<button onclick="show('posts')">Posts</button>
<button onclick="show('chat')">Chat</button>
<button onclick="show('meet')">Meet</button>
</div>

<div id="posts" class="section active">
<textarea id="postText"></textarea>
<input type="file" id="imageInput">
<button onclick="addPost()">Post</button>
<div id="feed"></div>
</div>

<div id="chat" class="section">
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<div id="meet" class="section">
<button onclick="findMatch()">Find Match</button>
<p id="status"></p>
<video id="cam" autoplay muted></video>
</div>

</div>

<script>

const API="https://africauni-backend1-1.onrender.com";
let socket=io(API);
let username="";

/* NAV */
function goLogin(){switchPage("login")}
function switchPage(p){document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));document.getElementById(p).classList.add("active")}
function show(s){document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));document.getElementById(s).classList.add("active")}

/* LOGIN */
function login(){
username=document.getElementById("username").value;
switchPage("dashboard");
}

/* POSTS */
function addPost(){
const text=document.getElementById("postText").value;
const img=document.getElementById("imageInput").files[0];

const form=new FormData();
form.append("username",username);
form.append("text",text);
if(img)form.append("image",img);

fetch(API+"/post",{method:"POST",body:form});
}

/* CHAT */
socket.emit("joinChat","room1");

socket.on("newMessage",d=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML="<b>"+d.user+"</b>: "+d.message;
document.getElementById("chatBox").appendChild(div);
});

function send(){
socket.emit("sendMessage",{roomId:"room1",user:username,message:msg.value});
msg.value="";
}

/* MEET */
function findMatch(){socket.emit("findMatch")}
socket.on("status",m=>status.innerText=m);
socket.on("matched",()=>status.innerText="Connected");

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true,audio:true})
.then(s=>cam.srcObject=s);

</script>

</body>
</html>
